version: "3.8"

services:
    gemini-bot:
        build: .
        container_name: gemini_agent
        restart: unless-stopped
        volumes:
            - ./logs:/app/logs
            - ./data:/app/data
            - ./tmp:/app/tmp
            - ./skills:/app/skills
            - ./workspace:/app/workspace
            - ./.env:/app/.env
            - ./GEMINI.md:/app/GEMINI.md
            # Sessions and credentials persisted in the .gemini hidden folder
            - ./.gemini:/root/.gemini
        env_file:
            - .env
        environment:
            - PYTHONUNBUFFERED=1
